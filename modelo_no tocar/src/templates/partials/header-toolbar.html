  <body>
    <header>
      <h1>
        <svg
          width="13"
          height="13"
          viewBox="0 0 16 16"
          fill="#58a6ff"
          style="vertical-align: -1px"
        >
          <path d="M2 2h5v5H2zM9 2h5v5H9zM2 9h5v5H2zM9 9h5v5H9z" />
        </svg>
        LOTES SAI v30.05
      </h1>

      <div class="sep"></div>

      <div class="toolbar">
        <!-- Grupo 1: Modos de dibujo -->
        <button class="btn active" id="btnPolygon" onclick="setMode('polygon')">
          <svg viewBox="0 0 24 24">
            <polygon points="3,20 12,4 21,20" />
          </svg>
          Parcela
        </button>
        <button class="btn" id="btnStreet" onclick="setMode('street')" disabled>
          <svg viewBox="0 0 24 24">
            <line x1="5" y1="6" x2="19" y2="6" />
            <line x1="5" y1="12" x2="19" y2="12" />
            <line x1="5" y1="18" x2="19" y2="18" />
          </svg>
          Trazar Calle
        </button>
        <button class="btn" id="btnEdit" onclick="setMode('edit')">
          <svg viewBox="0 0 24 24">
            <path
              d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
            />
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
          </svg>
          Editar Calles
        </button>
        <button
          class="btn purple"
          id="btnSlice"
          onclick="setMode('slice')"
          disabled
        >
          <svg viewBox="0 0 24 24">
            <line x1="6" y1="3" x2="6" y2="15" />
            <line x1="18" y1="9" x2="18" y2="21" />
            <line x1="3" y1="6" x2="15" y2="6" />
            <line x1="9" y1="18" x2="21" y2="18" />
            <line x1="3" y1="3" x2="21" y2="21" />
          </svg>
          Subdivisión Manual
        </button>

        <div class="sep"></div>

        <!-- Grupo 2: Ancho de calle -->
        <div class="sc">
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#8b949e"
            stroke-width="1.8"
            stroke-linecap="round"
          >
            <path d="M3 9h18M3 15h18M9 3v18M15 3v18" />
          </svg>
          <span>Calle:</span>
          <input
            type="range"
            id="swRange"
            min="2"
            max="40"
            value="8"
            oninput="
              swVal = parseFloat(this.value);
              document.getElementById('swDisp').textContent = this.value;
            "
          />
          <span class="sv" id="swDisp">8</span><span>m</span>
        </div>

        <div class="sep"></div>

        <!-- Grupo 3: Importar / Exportar / Vista Previa -->
        <div
          style="position: relative; display: inline-flex"
          id="importBtnWrap"
        >
          <button class="btn blue" onclick="toggleImportMenu(event)">
            <svg viewBox="0 0 24 24">
              <polyline points="16,16 12,12 8,16" />
              <line x1="12" y1="12" x2="12" y2="21" />
              <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3" />
            </svg>
            Importar
            <svg viewBox="0 0 24 24" style="width: 9px; height: 9px">
              <polyline points="6,9 12,15 18,9" />
            </svg>
          </button>
          <div
            id="importMenu"
            style="
              display: none;
              position: absolute;
              top: calc(100% + 4px);
              left: 0;
              background: #161b22;
              border: 1px solid #30363d;
              border-radius: 6px;
              box-shadow: 0 4px 18px #00000088;
              z-index: 9000;
              min-width: 175px;
              overflow: hidden;
              font-family: &quot;Courier New&quot;, monospace;
            "
          >
            <button
              onclick="
                closeImportMenu();
                triggerImportDXF();
              "
              style="
                display: flex;
                align-items: center;
                gap: 8px;
                width: 100%;
                text-align: left;
                padding: 7px 12px;
                background: transparent;
                border: none;
                border-bottom: 1px solid #21262d;
                color: #79c0ff;
                font-size: 11px;
                font-family: &quot;Courier New&quot;, monospace;
                cursor: pointer;
              "
              onmouseover="this.style.background = '#1c2a3a'"
              onmouseout="this.style.background = 'transparent'"
            >
              <svg
                width="13"
                height="13"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
                />
                <polyline points="14,2 14,8 20,8" />
              </svg>
              DXF (AutoCAD)
            </button>

            <button
              onclick="
                closeImportMenu();
                triggerImportKMZ();
              "
              style="
                display: flex;
                align-items: center;
                gap: 8px;
                width: 100%;
                text-align: left;
                padding: 7px 12px;
                background: transparent;
                border: none;
                border-bottom: 1px solid #21262d;
                color: #56d364;
                font-size: 11px;
                font-family: &quot;Courier New&quot;, monospace;
                cursor: pointer;
              "
              onmouseover="this.style.background = '#1a2a1a'"
              onmouseout="this.style.background = 'transparent'"
            >
              <svg
                width="13"
                height="13"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="12" r="10" />
                <line x1="2" y1="12" x2="22" y2="12" />
                <path
                  d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
                />
              </svg>
              KMZ / KML (Google Earth)
            </button>
            <button
              onclick="
                closeImportMenu();
                triggerOrthoKMZ();
              "
              style="
                display: flex;
                align-items: center;
                gap: 8px;
                width: 100%;
                text-align: left;
                padding: 7px 12px;
                background: transparent;
                border: none;
                color: #79c0ff;
                font-size: 11px;
                font-family: &quot;Courier New&quot;, monospace;
                cursor: pointer;
              "
              onmouseover="this.style.background = '#1a2535'"
              onmouseout="this.style.background = 'transparent'"
            >
              <svg
                width="13"
                height="13"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="2" y="3" width="20" height="14" rx="2" />
                <circle cx="8" cy="8" r="2" />
                <polyline points="14,7 18,13 10,13 6,10" />
              </svg>
              Ortofoto KMZ
            </button>
          </div>
        </div>

        <input
          type="file"
          id="kmzFileInput"
          accept=".kmz,.kml"
          style="display: none"
          onchange="handleKMZFileSelected(this)"
        />
        <input
          type="file"
          id="dxfFileInput"
          accept=".dxf"
          style="display: none"
          onchange="handleDXFFileSelected(this)"
        />

        <button class="btn green" onclick="exportDXF()">
          <svg viewBox="0 0 24 24">
            <polyline points="8,17 12,21 16,17" />
            <line x1="12" y1="12" x2="12" y2="21" />
            <path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3" />
          </svg>
          Exportar DXF
        </button>

        <div
          style="position: relative; display: inline-flex"
          id="vistaPreviaWrap"
        >
          <button class="btn blue" onclick="toggleVistaPreviaMenu(event)">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="3" width="18" height="18" rx="2" />
              <line x1="3" y1="9" x2="21" y2="9" />
              <line x1="9" y1="21" x2="9" y2="9" />
            </svg>
            Vista Previa
            <svg viewBox="0 0 24 24" style="width: 9px; height: 9px">
              <polyline points="6,9 12,15 18,9" />
            </svg>
          </button>
          <div
            id="vistaPreviaMenu"
            style="
              display: none;
              position: absolute;
              top: calc(100% + 4px);
              left: 0;
              background: #161b22;
              border: 1px solid #30363d;
              border-radius: 6px;
              box-shadow: 0 4px 18px #00000088;
              z-index: 9000;
              min-width: 175px;
              overflow: hidden;
              font-family: &quot;Courier New&quot;, monospace;
            "
          >
            <button
              onclick="
                closeVistaPreviaMenu();
                printPlan();
              "
              style="
                display: flex;
                align-items: center;
                gap: 8px;
                width: 100%;
                text-align: left;
                padding: 7px 12px;
                background: transparent;
                border: none;
                border-bottom: 1px solid #21262d;
                color: #79c0ff;
                font-size: 11px;
                font-family: &quot;Courier New&quot;, monospace;
                cursor: pointer;
              "
              onmouseover="this.style.background = '#1c2a3a'"
              onmouseout="this.style.background = 'transparent'"
            >
              <svg
                width="13"
                height="13"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="3" y="3" width="18" height="18" rx="2" />
                <line x1="3" y1="9" x2="21" y2="9" />
                <line x1="9" y1="21" x2="9" y2="9" />
              </svg>
              Plano General
            </button>
            <button
              onclick="
                closeVistaPreviaMenu();
                abrirPlanoLote();
              "
              style="
                display: flex;
                align-items: center;
                gap: 8px;
                width: 100%;
                text-align: left;
                padding: 7px 12px;
                background: transparent;
                border: none;
                color: #d2a8ff;
                font-size: 11px;
                font-family: &quot;Courier New&quot;, monospace;
                cursor: pointer;
              "
              onmouseover="this.style.background = '#1c1028'"
              onmouseout="this.style.background = 'transparent'"
            >
              <svg
                width="13"
                height="13"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
                />
                <polyline points="14,2 14,8 20,8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
              </svg>
              Plano por Lote
            </button>
          </div>
        </div>

        <div class="sep"></div>

        <!-- Grupo 4: Proyecto -->
        <button
          class="btn green"
          onclick="saveProject()"
          title="Guardar proyecto"
        >
          <svg viewBox="0 0 24 24">
            <path
              d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"
            />
            <polyline points="17,21 17,13 7,13 7,21" />
            <polyline points="7,3 7,8 15,8" />
          </svg>
          Guardar
        </button>
        <button
          class="btn green"
          onclick="triggerLoadProject()"
          title="Cargar proyecto"
        >
          <svg viewBox="0 0 24 24">
            <path
              d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"
            />
          </svg>
          Abrir
        </button>
        <input
          type="file"
          id="projectFileInput"
          accept=".lsai"
          style="display: none"
          onchange="handleProjectFileSelected(this)"
        />

        <div class="sep"></div>

        <!-- Grupo 5: Utilidades y acciones -->
        <button class="btn cyan" onclick="toggleCalc()" title="Calculadora">
          <svg viewBox="0 0 24 24">
            <rect x="4" y="2" width="16" height="20" rx="2" />
            <line x1="8" y1="6" x2="16" y2="6" />
            <line x1="8" y1="10" x2="16" y2="10" />
            <line x1="8" y1="14" x2="12" y2="14" />
          </svg>
          Calc
        </button>
        <button
          class="btn red"
          onclick="deleteParcela()"
          title="Elimina la parcela y su contenido"
        >
          <svg viewBox="0 0 24 24">
            <polyline points="3,6 5,6 21,6" />
            <path d="M19 6l-1 14H6L5 6" />
            <path d="M10 11v6M14 11v6" />
            <path d="M9 6V4h6v2" />
          </svg>
          Parcela
        </button>
        <button class="btn blue" onclick="resetAll()">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <line x1="8" y1="12" x2="16" y2="12" />
            <line x1="12" y1="8" x2="12" y2="16" />
          </svg>
          Nuevo
        </button>
      </div>
    </header>
