    <div
      id="printModal"
      style="
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(13, 17, 23, 0.96);
        z-index: 9999;
        align-items: flex-start;
        justify-content: center;
        overflow-y: auto;
        padding: 20px 0;
        font-family: &quot;Courier New&quot;, monospace;
      "
    >
      <div
        style="
          background: #161b22;
          border: 1px solid #30363d;
          border-radius: 10px;
          padding: 20px;
          width: 900px;
          max-width: 98vw;
        "
      >
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
          "
        >
          <span
            style="
              color: #79c0ff;

          >
          <div style="display: flex; gap: 8px">
            <button
              onclick="downloadPlanoPDF()"
              style="
                padding: 6px 14px;
                border-radius: 5px;
                border: 1px solid #79c0ff;
                background: transparent;
                cursor: pointer;
                font-size: 11px;
                font-family: &quot;Courier New&quot;, monospace;
                color: #79c0ff;
              "
            >
              &#8595; Descargar PDF
            </button>
            <button
              onclick="_downloadPlanoPNG()"
              style="
                padding: 6px 14px;
                border-radius: 5px;
                border: 1px solid #3fb950;

                cursor: pointer;
                font-size: 11px;
                font-family: &quot;Courier New&quot;, monospace;
                color: #3fb950;
              "
            >
              &#8595; Descargar PNG
            </button>
            <button

                padding: 6px 14px;
                border-radius: 5px;
                border: 1px solid #f85149;
                background: transparent;
                cursor: pointer;
                font-size: 11px;
                font-family: &quot;Courier New&quot;, monospace;
                color: #f85149;
              "
            >
              &#10005; Cerrar

          <input

              border: 1px solid #30363d;

              font-family: &quot;Courier New&quot;, monospace;
              width: 180px;
            "
          />
          <div style="font-size: 10px; color: #8b949e">Propietario:</div>
          <input
            id="planOwner"
            type="text"

              border: 1px solid #30363d;
              border-radius: 3px;
              color: #e6edf3;
              padding: 4px 8px;
              font-size: 11px;

              padding: 4px 8px;
              font-size: 11px;
              font-family: &quot;Courier New&quot;, monospace;
              width: 140px;
            "
          />

            onclick="regeneratePlan()"

              padding: 4px 10px;
              border-radius: 4px;
              border: 1px solid #e3b341;
              background: transparent;
              cursor: pointer;
              font-size: 10px;
              font-family: &quot;Courier New&quot;, monospace;
              color: #e3b341;
            "
          >
            &#9654; Regenerar
          </button>
        </div>
        <canvas
          id="planCanvas"
          style="
            width: 100%;
            border: 1px solid #30363d;
            border-radius: 4px;
            display: block;

        ></canvas>
